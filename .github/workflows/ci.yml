name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - uses: extractions/setup-just@v4

      - name: Install Swift tooling
        run: brew install swiftformat swiftlint xcodegen

      - name: Check bootstrap state
        id: guard
        run: |
          if [ -f project.yml ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Project not bootstrapped yet (no project.yml) — skipping build/test so the docs-only scaffold stays green. See DESIGN.md milestone M0."
          fi

      - name: Bootstrap (XcodeGen + SPM resolve)
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just bootstrap

      - name: Lint, build, test
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just ci
